version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: lazynginx
    main: ./main.go
    binary: lazynginx
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w

archives:
  - id: lazynginx-archive
    builds:
      - lazynginx
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^test:"
      - "^chore:"
      - "merge conflict"

release:
  github:
    owner: giacomomasseron
    name: lazynginx
  prerelease: auto
